name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: "."
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -q -m "not postgres"

  postgres-concurrency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: leo
          POSTGRES_PASSWORD: leo
          POSTGRES_DB: leo_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leo -d leo_crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHONPATH: "."
      DATABASE_URL: "postgresql+psycopg2://leo:leo@127.0.0.1:5432/leo_crm_test"
      POSTGRES_TEST_DATABASE_URL: "postgresql+psycopg2://leo:leo@127.0.0.1:5432/leo_crm_test"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -q -m postgres
