name: PostgreSQL concurrency

on:
  pull_request:
  push:
    branches:
      - main
      - agent/c4-6-stabilization

jobs:
  postgres-lease-concurrency:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: leo_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d leo_crm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONPATH: .
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/leo_crm_test
      POSTGRES_TEST_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/leo_crm_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run PostgreSQL concurrency test
        id: postgres_test
        continue-on-error: true
        run: pytest -q tests/test_postgres_lease_concurrency.py > postgres-test.log 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: postgres-test-log
          path: postgres-test.log
      - name: Fail when PostgreSQL test failed
        if: steps.postgres_test.outcome == 'failure'
        run: exit 1
