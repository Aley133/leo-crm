name: Browser Agent Release

on:
  push:
    tags:
      - "browser-agent-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --onefile --console `
            --name LEO-Browser-Agent `
            --collect-submodules backend `
            --collect-submodules tools `
            tools/browser_agent_desktop.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LEO-Browser-Agent-Windows
          path: dist/LEO-Browser-Agent.exe

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/browser-agent-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LEO-Browser-Agent.exe
          generate_release_notes: true
