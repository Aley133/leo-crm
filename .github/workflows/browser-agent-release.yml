name: Browser Agent Release

on:
  push:
    branches:
      - main
    paths:
      - "tools/__init__.py"
      - "tools/browser_agent.py"
      - "tools/browser_agent_desktop.py"
      - "tools/windows/LEO-Browser-Agent.iss"
      - "backend/app/supplier_adapters/**"
      - ".github/workflows/browser-agent-release.yml"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Verify desktop imports
        shell: pwsh
        run: |
          python -c "import tools.browser_agent; import tools.browser_agent_desktop"

      - name: Verify release version alignment
        shell: pwsh
        run: |
          $desktop = Get-Content "tools/browser_agent_desktop.py" -Raw
          $installer = Get-Content "tools/windows/LEO-Browser-Agent.iss" -Raw
          $desktopVersion = [regex]::Match($desktop, 'APP_VERSION = "([^"]+)"').Groups[1].Value
          $installerVersion = [regex]::Match($installer, '#define MyAppVersion "([^"]+)"').Groups[1].Value
          if (-not $desktopVersion -or $desktopVersion -ne $installerVersion) {
            throw "Browser Agent version mismatch: desktop=$desktopVersion installer=$installerVersion"
          }

      - name: Build application executable
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed `
            --name LEO-Browser-Agent `
            --paths . `
            --hidden-import tools.browser_agent `
            --collect-submodules backend `
            --collect-submodules tools `
            tools/browser_agent_desktop.py

      - name: Smoke test packaged executable
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/LEO-Browser-Agent.exe")) { throw "Browser Agent executable was not created" }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "tools\windows\LEO-Browser-Agent.iss"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LEO-Browser-Agent-Windows
          path: dist/LEO-Browser-Agent-Setup.exe

      - name: Publish rolling GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f browser-agent-latest $env:GITHUB_SHA
          git push origin refs/tags/browser-agent-latest --force
          gh release view browser-agent-latest *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create browser-agent-latest --title "LEO Browser Agent" --notes "Автоматическая сборка Windows Browser Agent."
          }
          gh release upload browser-agent-latest dist/LEO-Browser-Agent-Setup.exe --clobber
