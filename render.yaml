services:
  - type: web
    name: leo-crm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium && alembic upgrade head
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
